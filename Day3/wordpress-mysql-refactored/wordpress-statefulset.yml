apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wordpress
  labels:
    app: wordpress
spec:
  serviceName: wordpress
  replicas: 1
  selector:
    matchLabels:
      app: wordpress
  template:
    metadata:
      labels:
        app: wordpress
    spec:
      volumes:
      - name: wordpress-storage
        persistentVolumeClaim:
          claimName: wordpress-pvc-jegan  # Replace 'jegan' with your name
      - name: mysqlconf
        emptyDir: {}

      initContainers:
      - name: wait-for-proxysql
        image: busybox:1.36
        command:
        - sh
        - "-c"
        - |
          until nc -z proxysql 6033; do
            echo "Waiting for ProxySQL..."
            sleep 3
          done
          echo "ProxySQL is ready."

      # Write my.cnf with ssl=false into an emptyDir volume.
      # MYSQL_HOME is set to /mysqlconf in the main container so the
      # mariadb client used by WP-CLI reads this file and skips SSL.
      # ProxySQL 2.5.5 generates SSL certs but has mysql-have_ssl=false,
      # however the mariadb 12.x CLI client tries SSL by default causing
      # 'SSL is required' errors during wp core install.
      - name: write-mysqlconf
        image: busybox:1.36
        command:
        - sh
        - "-c"
        - |
          printf '[client]\nskip-ssl\nssl=false\n' > /mysqlconf/my.cnf
          echo "my.cnf written:"
          cat /mysqlconf/my.cnf
        volumeMounts:
        - name: mysqlconf
          mountPath: /mysqlconf

      containers:
      - name: wordpress
        image: image-registry.openshift-image-registry.svc:5000/openshift/wordpress:1.0
        imagePullPolicy: IfNotPresent

        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

        readinessProbe:
          httpGet:
            path: /wp-login.php
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6

        livenessProbe:
          httpGet:
            path: /wp-login.php
            port: 8080
          initialDelaySeconds: 120
          periodSeconds: 20
          timeoutSeconds: 5

        env:
        - name: WORDPRESS_DATABASE_USER
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: username
        - name: WORDPRESS_USERNAME
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: username
        - name: WORDPRESS_DATABASE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: password
        - name: WORDPRESS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wordpress-login-credentials
              key: password
        - name: WORDPRESS_DATABASE_NAME
          valueFrom:
            configMapKeyRef:
              name: wordpress-cm
              key: db_name
        - name: WORDPRESS_DATABASE_HOST
          valueFrom:
            configMapKeyRef:
              name: wordpress-cm
              key: db_service_name
        - name: WORDPRESS_DATABASE_PORT_NUMBER
          valueFrom:
            configMapKeyRef:
              name: wordpress-cm
              key: db_service_port
        - name: WORDPRESS_HOSTNAME
          valueFrom:
            configMapKeyRef:
              name: wordpress-cm
              key: site_hostname
        # MYSQL_HOME tells the mariadb CLI client where to find my.cnf.
        # We point it at the emptyDir where write-mysqlconf wrote
        # skip-ssl and ssl=false. This prevents WP-CLI from trying SSL
        # against ProxySQL during wp core install.
        - name: MYSQL_HOME
          value: /mysqlconf

        volumeMounts:
        - name: wordpress-storage
          mountPath: /bitnami
        - name: mysqlconf
          mountPath: /mysqlconf
