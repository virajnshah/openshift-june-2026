apiVersion: v1
kind: ConfigMap
metadata:
  name: proxysql-cm
data:
  proxysql.cnf: |
    datadir="/var/lib/proxysql"

    admin_variables=
    {
      admin_credentials="proxyadmin:proxyadmin@123"
      mysql_ifaces="0.0.0.0:6032"
    }

    mysql_variables=
    {
      interfaces="0.0.0.0:6033"
      default_query_delay=0
      default_query_timeout=36000000
      max_connections=2048
      default_schema="wordpress"
      monitor_username="monitor"
      monitor_password="monitor"
      monitor_connect_interval=2000
      monitor_ping_interval=2000
      # Disable SSL between clients and ProxySQL.
      # MariaDB in this lab is not configured with SSL certificates,
      # so requiring SSL causes 'SSL is required' errors from WordPress.
      have_ssl=false
      # Disable SSL between ProxySQL and MySQL backends.
      mysql_ssl_capath=""
    }

    mysql_servers=
    (
      {
        address="mysql-0.mysql"
        port=3306
        hostgroup=10
        status="ONLINE"
        weight=1
        max_connections=100
        comment="primary - writer"
      },
      {
        address="mysql-0.mysql"
        port=3306
        hostgroup=20
        status="ONLINE"
        weight=1
        max_connections=100
        comment="primary - also serves reads"
      },
      {
        address="mysql-1.mysql"
        port=3306
        hostgroup=20
        status="ONLINE"
        weight=1
        max_connections=100
        comment="replica 1 - reader"
      },
      {
        address="mysql-2.mysql"
        port=3306
        hostgroup=20
        status="ONLINE"
        weight=1
        max_connections=100
        comment="replica 2 - reader"
      }
    )

    mysql_users=
    (
      {
        username="root"
        password="root@123"
        default_hostgroup=10
        active=1
      }
    )

    mysql_query_rules=
    (
      {
        rule_id=1
        active=1
        match_pattern="^SELECT .* FOR UPDATE"
        destination_hostgroup=10
        apply=1
        comment="SELECT FOR UPDATE -> writer"
      },
      {
        rule_id=2
        active=1
        match_pattern="^SELECT"
        destination_hostgroup=20
        apply=1
        comment="SELECT -> readers"
      }
    )
