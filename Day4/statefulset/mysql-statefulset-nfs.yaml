################################################################################
# MySQL on OpenShift: 3-pod StatefulSet, static NFS volumes, GTID replication.
#
# Topology: mysql-0 is the primary (read/write). mysql-1 and mysql-2 are
# replicas that pull all writes from mysql-0 using GTID auto-positioning.
# The StatefulSet supplies stable names and per-pod NFS storage; MySQL itself
# does the data synchronization.
#
# EDIT before applying: NFS server + export paths, and the root/replication
# passwords (move them into a Secret for anything real).
################################################################################
---
# ---- Three static NFS PersistentVolumes, one per pod ----
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-nfs-0
  labels: { app: mysql }
spec:
  capacity: { storage: 100Mi }
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    server: 192.168.10.201        # EDIT: your NFS server
    path: /var/nfs/jegan/mysql-0       # EDIT: a distinct, empty export per pod
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-nfs-1
  labels: { app: mysql }
spec:
  capacity: { storage: 100Mi }
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    server: 192.168.10.201        # EDIT
    path: /var/nfs/jegan/mysql-1       # EDIT
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-nfs-2
  labels: { app: mysql }
spec:
  capacity: { storage: 100Mi }
  accessModes: ["ReadWriteOnce"]
  persistentVolumeReclaimPolicy: Retain
  storageClassName: nfs
  nfs:
    server: 192.168.10.201        # EDIT
    path: /var/nfs/jegan/mysql-2       # EDIT
---
# ---- Config fragments + init/replication scripts ----
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql
  labels: { app: mysql }
data:
  common.cnf: |
    [mysqld]
    gtid_mode=ON
    enforce_gtid_consistency=ON
    binlog_format=ROW
  # Runs in docker-entrypoint-initdb.d on first boot. Creates the replication
  # user, but only on mysql-0 so replicas don't try to write during init.
  init-primary.sh: |
    #!/bin/bash
    if [[ "$HOSTNAME" =~ -0$ ]]; then
      mysql -uroot -p"$MYSQL_ROOT_PASSWORD" <<-SQL
        CREATE USER IF NOT EXISTS 'repl'@'%'
          IDENTIFIED WITH mysql_native_password BY 'replpass';
        GRANT REPLICATION SLAVE ON *.* TO 'repl'@'%';
        FLUSH PRIVILEGES;
      SQL
    fi
  # Runs in a sidecar. On replicas only, waits for both servers then points
  # this pod at mysql-0 and starts replicating.
  setup-replica.sh: |
    #!/bin/bash
    set -e
    [[ "$HOSTNAME" =~ -([0-9]+)$ ]]
    ordinal=${BASH_REMATCH[1]}
    if [[ "$ordinal" -eq 0 ]]; then
      echo "primary pod, nothing to configure"; exec sleep infinity
    fi
    until mysql -h127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" -e 'SELECT 1' &>/dev/null; do
      echo "waiting for local mysqld..."; sleep 3
    done
    until mysql -hmysql-0.mysql -urepl -preplpass -e 'SELECT 1' &>/dev/null; do
      echo "waiting for primary mysql-0..."; sleep 3
    done
    mysql -h127.0.0.1 -uroot -p"$MYSQL_ROOT_PASSWORD" <<-SQL
      STOP REPLICA;
      CHANGE REPLICATION SOURCE TO
        SOURCE_HOST='mysql-0.mysql',
        SOURCE_USER='repl',
        SOURCE_PASSWORD='replpass',
        SOURCE_AUTO_POSITION=1;
      START REPLICA;
    SQL
    echo "replication started"; exec sleep infinity
---
# ---- Headless Service: stable per-pod DNS (mysql-0.mysql, mysql-1.mysql, ...) ----
apiVersion: v1
kind: Service
metadata:
  name: mysql
  labels: { app: mysql }
spec:
  clusterIP: None
  selector: { app: mysql }
  ports:
    - { name: mysql, port: 3306 }
---
# ---- Read Service: load-balances connections across all three pods ----
apiVersion: v1
kind: Service
metadata:
  name: mysql-read
  labels: { app: mysql }
spec:
  selector: { app: mysql }
  ports:
    - { name: mysql, port: 3306 }
---
# ---- The StatefulSet ----
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  labels: { app: mysql }
spec:
  serviceName: mysql
  replicas: 3
  selector:
    matchLabels: { app: mysql }
  template:
    metadata:
      labels: { app: mysql }
    spec:
      initContainers:
        # Give each pod a unique server-id and the shared GTID config.
        - name: init-config
          image: mysql:8.4
          command:
            - bash
            - -c
            - |
              set -e
              [[ "$HOSTNAME" =~ -([0-9]+)$ ]]
              ordinal=${BASH_REMATCH[1]}
              printf '[mysqld]\nserver-id=%d\n' $((100 + ordinal)) > /etc/mysql/conf.d/server-id.cnf
              cp /mnt/config-map/common.cnf /etc/mysql/conf.d/common.cnf
          volumeMounts:
            - { name: conf, mountPath: /etc/mysql/conf.d }
            - { name: config-map, mountPath: /mnt/config-map }
      containers:
        - name: mysql
          image: mysql:8.4
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: rootpass            # EDIT: use a Secret
          ports:
            - { name: mysql, containerPort: 3306 }
          volumeMounts:
            - { name: data, mountPath: /var/lib/mysql }
            - { name: conf, mountPath: /etc/mysql/conf.d }
            - { name: initdb, mountPath: /docker-entrypoint-initdb.d }
          readinessProbe:
            exec:
              command: ["bash", "-c", "mysqladmin ping -uroot -p$MYSQL_ROOT_PASSWORD"]
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["bash", "-c", "mysqladmin ping -uroot -p$MYSQL_ROOT_PASSWORD"]
            initialDelaySeconds: 45
            periodSeconds: 15
        # Sidecar that configures replication on the replica pods.
        - name: setup-replica
          image: mysql:8.4
          env:
            - name: MYSQL_ROOT_PASSWORD
              value: rootpass            # EDIT: match above / use a Secret
          command: ["bash", "/scripts/setup-replica.sh"]
          volumeMounts:
            - { name: scripts, mountPath: /scripts }
      volumes:
        - name: conf
          emptyDir: {}
        - name: config-map
          configMap: { name: mysql }
        - name: initdb
          configMap:
            name: mysql
            items:
              - { key: init-primary.sh, path: init-primary.sh }
        - name: scripts
          configMap:
            name: mysql
            items:
              - { key: setup-replica.sh, path: setup-replica.sh }
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: nfs
        resources:
          requests: { storage: 100Mi }
