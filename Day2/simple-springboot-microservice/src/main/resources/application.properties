spring.application.name=greeting-service

# Container listens on 8080, the port the OpenShift Service will target.
server.port=8080

# Expose the health endpoint and split it into liveness/readiness groups.
# OpenShift probes hit:
#   /actuator/health/liveness   -> is the JVM alive?
#   /actuator/health/readiness  -> is the app ready to take traffic?
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

# Graceful shutdown so in-flight requests finish when a pod is rolled.
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s
